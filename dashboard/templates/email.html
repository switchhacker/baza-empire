<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baza Empire — Email Queue</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#07070f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
    a{color:inherit;text-decoration:none}
    .nav{background:#0d0d1e;border-bottom:1px solid #1a1a3a;padding:0 32px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100}
    .nav-brand{display:flex;align-items:center;gap:10px;padding:18px 24px 18px 0;border-right:1px solid #1a1a3a;margin-right:8px}
    .nav-brand h1{font-size:18px;font-weight:800;color:#e94560;letter-spacing:2px}
    .nav-link{padding:20px 18px;font-size:13px;font-weight:600;color:#666;border-bottom:3px solid transparent;transition:color .2s,border-color .2s}
    .nav-link:hover,.nav-link.active{color:#e0e0e0;border-bottom-color:#e94560}
    .container{max-width:1200px;margin:0 auto;padding:28px 32px}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .page-title{font-size:22px;font-weight:800;color:#fff}
    .page-subtitle{font-size:13px;color:#444;margin-top:4px}

    .stats-row{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .stat-box{background:#0e0e1e;border:1px solid #1a1a2e;border-radius:8px;padding:14px 20px;min-width:120px;text-align:center}
    .stat-val{font-size:24px;font-weight:800;color:#fff}
    .stat-label{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
    .stat-box.pending .stat-val{color:#ffaa00}
    .stat-box.approved .stat-val{color:#00d084}
    .stat-box.ignored .stat-val{color:#666}

    .filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .filter-btn{padding:7px 14px;background:#0e0e1e;border:1px solid #1a1a2e;border-radius:20px;font-size:12px;color:#666;cursor:pointer;transition:all .2s}
    .filter-btn:hover,.filter-btn.active{background:#1a0a2a;border-color:#e94560;color:#e94560}
    .refresh-btn{margin-left:auto;background:#1a1a2e;border:1px solid #2a2a4a;color:#888;padding:8px 14px;border-radius:7px;cursor:pointer;font-size:12px}
    .refresh-btn:hover{border-color:#e94560;color:#e94560}

    .email-list{display:flex;flex-direction:column;gap:12px}
    .email-card{background:#0e0e1e;border:1px solid #1a1a2e;border-radius:10px;padding:20px;transition:border-color .2s}
    .email-card:hover{border-color:#2a2a4a}
    .email-card.priority-high{border-left:3px solid #e94560}
    .email-card.priority-medium{border-left:3px solid #ffaa00}
    .email-card.priority-low{border-left:3px solid #1a1a2e}
    .email-card.status-approved{opacity:.7}
    .email-card.status-ignored{opacity:.4}

    .email-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
    .email-from{font-size:13px;font-weight:700;color:#ccc}
    .email-subject{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
    .email-time{font-size:11px;color:#444;white-space:nowrap}
    .email-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
    .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase}
    .badge-pending{background:#2a1a00;color:#ffaa00;border:1px solid #4a3000}
    .badge-approved{background:#0a2a1a;color:#00d084;border:1px solid #1a5a2a}
    .badge-ignored{background:#1a1a1a;color:#555;border:1px solid #333}
    .badge-sent{background:#0a1a2a;color:#4da6ff;border:1px solid #1a3a6a}
    .badge-high{background:#2a0a0a;color:#ff6666;border:1px solid #5a1a1a}
    .badge-medium{background:#2a1a00;color:#ffaa00;border:1px solid #5a3a00}

    .email-summary{font-size:13px;color:#888;margin-bottom:12px;line-height:1.5}
    .email-draft{background:#070718;border:1px solid #1a1a2e;border-radius:6px;padding:12px;font-size:12px;color:#a0c0ff;font-family:monospace;margin-bottom:12px;white-space:pre-wrap;line-height:1.6}
    .email-draft-edit{background:#070718;border:1px solid #7c3aed;border-radius:6px;padding:12px;font-size:12px;color:#e0e0e0;font-family:monospace;width:100%;resize:vertical;min-height:100px;outline:none;line-height:1.6}

    .email-actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:opacity .2s}
    .btn:hover{opacity:.8}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-approve{background:#0a3a1a;color:#00d084;border:1px solid #1a6a2a}
    .btn-edit{background:#1a1a3a;color:#c4b5fd;border:1px solid #3a2a6a}
    .btn-ignore{background:#1a1a1a;color:#666;border:1px solid #333}
    .btn-send{background:linear-gradient(135deg,#00d084,#0070c0);color:#fff}
    .btn-cancel{background:#2a0a0a;color:#ff6666;border:1px solid #5a1a1a}
    .btn-expand{background:none;border:none;color:#444;cursor:pointer;font-size:12px;padding:4px 8px}
    .btn-expand:hover{color:#888}

    .full-body{display:none;background:#050510;border:1px solid #111;border-radius:6px;padding:14px;font-size:12px;color:#999;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:8px;line-height:1.6}
    .full-body.open{display:block}

    .empty{text-align:center;padding:60px 40px;color:#333;background:#0e0e1e;border:1px solid #1a1a2e;border-radius:10px}

    .toast{position:fixed;bottom:24px;right:24px;background:#0a2a1a;border:1px solid #00d084;color:#00d084;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;display:none}
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand"><span>⚡</span><h1>BAZA EMPIRE</h1></div>
  <a class="nav-link" href="/">Agents</a>
  <a class="nav-link" href="/crons">Cron Jobs</a>
  <a class="nav-link" href="/artifacts">Artifacts</a>
  <a class="nav-link active" href="/email">Email</a>
  <a class="nav-link" href="/settings">Settings</a>
  <a class="nav-link" href="/infra">Infra Map</a>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">📧 Email Queue</div>
      <div class="page-subtitle">4-stage pipeline: Fetch → Summarize → Approve → Send</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box pending"><div class="stat-val" id="cnt-pending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-box approved"><div class="stat-val" id="cnt-approved">—</div><div class="stat-label">Approved</div></div>
    <div class="stat-box"><div class="stat-val" id="cnt-sent" style="color:#4da6ff">—</div><div class="stat-label">Sent</div></div>
    <div class="stat-box ignored"><div class="stat-val" id="cnt-ignored">—</div><div class="stat-label">Ignored</div></div>
    <div class="stat-box"><div class="stat-val" id="cnt-total" style="color:#ccc">—</div><div class="stat-label">Total</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">⏳ Pending</button>
    <button class="filter-btn" onclick="setFilter('approved',this)">✅ Approved</button>
    <button class="filter-btn" onclick="setFilter('sent',this)">📤 Sent</button>
    <button class="filter-btn" onclick="setFilter('ignored',this)">🚫 Ignored</button>
    <button class="refresh-btn" onclick="loadQueue()">↻ Refresh</button>
  </div>

  <div class="email-list" id="emailList">
    <div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div>Loading email queue...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allEmails = [];
let currentFilter = 'all';

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEmails();
}

function fetchNew(){
  fetch('/api/email/fetch',{method:'POST'}).then(r=>r.json()).then(d=>{
    if(d.success){ showToast('⬇️ Fetching new emails... refresh in 30s'); setTimeout(loadQueue, 8000); }
    else showToast('Fetch failed: '+d.error);
  });
}

function loadQueue(){
  fetch('/api/email/queue').then(r=>r.json()).then(data=>{
    allEmails = (data.records || data || []).reverse ? (data.records || data || []).slice().reverse() : (data.records || data || []);
    updateStats();
    renderEmails();
  }).catch(()=>{
    document.getElementById('emailList').innerHTML =
      '<div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="color:#444">No email queue data yet.<br>The pipeline will populate this once emails arrive.</div></div>';
  });
}

function updateStats(){
  const cnt = s => allEmails.filter(e=>s==='pending'?(e.status==='pending'||e.status==='awaiting_confirmation'):e.status===s).length;
  document.getElementById('cnt-pending').textContent  = cnt('pending');
  document.getElementById('cnt-approved').textContent = cnt('approved');
  document.getElementById('cnt-sent').textContent     = cnt('sent');
  document.getElementById('cnt-ignored').textContent  = cnt('ignored');
  document.getElementById('cnt-total').textContent    = allEmails.length;
}

function renderEmails(){
  const list = document.getElementById('emailList');
  const filtered = currentFilter === 'all' ? allEmails : allEmails.filter(e=>(currentFilter==='pending'?(e.status==='pending'||e.status==='awaiting_confirmation'):e.status===currentFilter));

  if(!filtered.length){
    list.innerHTML = '<div class="empty"><div style="font-size:36px;margin-bottom:12px">📭</div><div style="color:#444">No emails in this view</div></div>';
    return;
  }

  list.innerHTML = filtered.map(e => emailCard(e)).join('');
}

function emailCard(e){
  const displayStatus = (e.status==='awaiting_confirmation'?'pending':e.status)||'pending';
  const statusBadge = `<span class="badge badge-${displayStatus}">${displayStatus.toUpperCase()}</span>`;
  const prioBadge   = e.priority && e.priority !== 'normal' ? `<span class="badge badge-${e.priority}">${e.priority.toUpperCase()}</span>` : '';
  const timeStr     = e.received_at ? new Date(e.received_at).toLocaleString() : '';
  const draft = e.suggested_reply || '';
  const isEditing = e._editing;

  return `<div class="email-card priority-${e.priority||'low'} status-${e.status||'pending'}" id="card-${e.gmail_id}">
    <div class="email-header">
      <div>
        <div class="email-subject">${esc(e.subject||'(no subject)')}</div>
        <div class="email-from">From: ${esc(e.from||'')} → To: ${esc(e.to||'')}</div>
      </div>
      <div class="email-time">${timeStr}</div>
    </div>
    <div class="email-meta">
      ${statusBadge}${prioBadge}
      ${e.labels ? e.labels.map(l=>`<span class="badge" style="background:#111;color:#555;border-color:#222">${esc(l)}</span>`).join('') : ''}
    </div>
    ${e.summary ? `<div class="email-summary">💡 ${esc(e.summary)}</div>` : ''}
    ${draft ? `<div class="email-draft" id="draft-${e.gmail_id}">${esc(draft)}</div>` : ''}
    ${e.body_snippet ? `<button class="btn-expand" onclick="toggleBody('${e.gmail_id}')">▼ Show full email</button>
    <div class="full-body" id="body-${e.gmail_id}">${esc(e.full_body||e.body_snippet||'')}</div>` : ''}
    <div class="email-actions" id="actions-${e.gmail_id}">
      ${renderActions(e)}
    </div>
  </div>`;
}

function renderActions(e){
  if(e.status === 'sent') return `<span style="color:#4da6ff;font-size:12px">📤 Sent</span>`;
  if(e.status === 'ignored') return `<span style="color:#444;font-size:12px">🚫 Ignored</span> <button class="btn btn-approve" onclick="doAction('${e.gmail_id}','approve')">↩ Restore</button>`;

  return `<button class="btn btn-approve" onclick="doAction('${e.gmail_id}','approve')">✅ Approve & Send</button>
          <button class="btn btn-edit" onclick="editDraft('${e.gmail_id}')">✏️ Edit Draft</button>
          <button class="btn btn-ignore" onclick="doAction('${e.gmail_id}','ignore')">🚫 Ignore</button>`;
}

function editDraft(gid){
  const draftEl = document.getElementById('draft-'+gid);
  const actEl   = document.getElementById('actions-'+gid);
  const current = draftEl ? draftEl.textContent : '';
  if(draftEl) draftEl.style.display = 'none';
  actEl.innerHTML = `
    <textarea class="email-draft-edit" id="edit-${gid}">${esc(current)}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-send" onclick="sendEdited('${gid}')">📤 Send Edited</button>
      <button class="btn btn-cancel" onclick="cancelEdit('${gid}','${esc(current)}')">✕ Cancel</button>
    </div>`;
}

function cancelEdit(gid, orig){
  const draftEl = document.getElementById('draft-'+gid);
  if(draftEl) draftEl.style.display = '';
  const e = allEmails.find(x=>x.gmail_id===gid);
  if(e) document.getElementById('actions-'+gid).innerHTML = renderActions(e);
}

function sendEdited(gid){
  const text = document.getElementById('edit-'+gid)?.value || '';
  doAction(gid, 'approve', text);
}

function doAction(gid, action, replyText=''){
  const e = allEmails.find(x=>x.gmail_id===gid);
  if(!e) return;
  fetch('/api/email/action',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({gmail_id:gid, action, reply_text:replyText||e.suggested_reply||''})
  }).then(r=>r.json()).then(d=>{
    if(d.success){
      e.status = action==='approve'?'approved':action;
      showToast(action==='approve'?'✅ Approved & queued for send':'Done');
      renderEmails();
      updateStats();
    }
  });
}

function toggleBody(gid){
  const el = document.getElementById('body-'+gid);
  el.classList.toggle('open');
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}

loadQueue();
setInterval(loadQueue, 30000);
</script>
</body>
</html>
